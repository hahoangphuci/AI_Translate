name: Deploy Python app to Azure Web App - aitranslate2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aitranslate2-production
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Stop if requirements are too heavy for App Service build
        shell: bash
        run: |
          if grep -Eiq '^(torch|torchvision|transformers|accelerate|triton|docling|docling-core|docling-ibm-models|docling-parse|docling-slim|onnx|onnxruntime|pywin32|docx2pdf)(==|[[:space:]]|$)' requirements.txt; then
            echo "requirements.txt still contains very heavy or Windows-only packages."
            echo "Remove those packages before deploying to avoid No space left on device."
            exit 1
          fi

      - name: Create clean deployment package
        shell: bash
        run: |
          zip -r deploy.zip requirements.txt api_base frontend \
            -x "api_base/instance/*" \
               "*/__pycache__/*" \
               "*.pyc" \
               "*/.venv/*" \
               "*/node_modules/*" \
               "*.env" \
               "*/.env" \
               "requirements-full.txt"
          ls -lh deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D467F7B1449C4EB38A079BE95B941D89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A2357084D02A4CD68A7C61B9A2155CAD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AC3D578CD1554555B4C3A9E215F9332B }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aitranslate2
          package: deploy.zip
