# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - aitranslate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aitranslate-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_771C990487C54F5FA2FE527C91F30417 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0113AD5896E4EF8B2B940E57D4F8B52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_54E7EB8FDF8F4DDA935EAFF754E02423 }}

      - name: Resolve Azure resource group
        run: |
          RG=$(az webapp show --name aitranslate --query resourceGroup -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not find resource group for app 'aitranslate'"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"
          echo "Using resource group: $RG"

      - name: Create deployment zip
        run: >
          zip -r deploy.zip .
          -x "antenv/*"
          -x ".git/*"
          -x "app_web_view/*"
          -x "frontend/node_modules/*"
          -x "*__pycache__/*"
          -x "*/.venv/*"

      - name: Deploy to Azure Web App (retry on 409)
        run: |
          set +e
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            az webapp deploy \
              --resource-group "$RESOURCE_GROUP" \
              --name aitranslate \
              --src-path deploy.zip \
              --type zip \
              --clean true \
              --restart true \
              --async false
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Deploy failed (exit $status). Waiting 90s before retry..."
              sleep 90
            fi
          done
          echo "All deploy attempts failed"
          exit 1
