# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - aitranslate

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Do NOT cancel in-progress deploys: cancelled OneDeploy runs leave Kudu locks (HTTP 409).
concurrency:
  group: aitranslate-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_771C990487C54F5FA2FE527C91F30417 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0113AD5896E4EF8B2B940E57D4F8B52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_54E7EB8FDF8F4DDA935EAFF754E02423 }}

      - name: Create deployment zip
        run: |
          zip -r deploy.zip requirements.txt api_base frontend \
            -x "api_base/instance/*" \
            -x "*__pycache__/*" \
            -x "*/.venv/*" \
            -x "frontend/node_modules/*"

      - name: Clear Kudu deployment locks
        run: |
          RG=$(az webapp list --query "[?name=='aitranslate'].resourceGroup | [0]" -o tsv)
          if [ -z "$RG" ]; then
            echo "Could not resolve resource group for aitranslate"
            exit 1
          fi
          echo "RESOURCE_GROUP=$RG" >> "$GITHUB_ENV"
          echo "Resource group: $RG"

          USER=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name aitranslate \
            --query publishingUserName -o tsv)
          PASS=$(az webapp deployment list-publishing-credentials \
            --resource-group "$RG" \
            --name aitranslate \
            --query publishingPassword -o tsv)

          SCM="https://aitranslate.scm.azurewebsites.net"
          curl -sf -u "$USER:$PASS" -H "Content-Type: application/json" \
            -d '{"command":"rm -f /home/site/locks/*.lock && echo locks-cleared","dir":"/home"}' \
            "$SCM/api/command" || echo "Lock cleanup skipped (non-fatal)"

          az webapp config appsettings set \
            --resource-group "$RG" \
            --name aitranslate \
            --settings WEBSITE_RUN_FROM_PACKAGE=1 SCM_DO_BUILD_DURING_DEPLOYMENT=true \
            --output none

          echo "Waiting 120s for Kudu to release any stale deployment state..."
          sleep 120

      - name: Deploy to Azure Web App
        run: |
          set +e
          for attempt in 1 2; do
            echo "Deploy attempt $attempt/2..."
            az webapp deploy \
              --resource-group "$RESOURCE_GROUP" \
              --name aitranslate \
              --src-path deploy.zip \
              --type zip \
              --clean true \
              --restart true \
              --async false
            status=$?
            if [ "$status" -eq 0 ]; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "Deploy failed (exit $status). Clearing locks and waiting 180s..."
              USER=$(az webapp deployment list-publishing-credentials \
                --resource-group "$RESOURCE_GROUP" \
                --name aitranslate \
                --query publishingUserName -o tsv)
              PASS=$(az webapp deployment list-publishing-credentials \
                --resource-group "$RESOURCE_GROUP" \
                --name aitranslate \
                --query publishingPassword -o tsv)
              curl -sf -u "$USER:$PASS" -H "Content-Type: application/json" \
                -d '{"command":"rm -f /home/site/locks/*.lock && echo locks-cleared","dir":"/home"}' \
                "https://aitranslate.scm.azurewebsites.net/api/command" || true
              sleep 180
            fi
          done
          echo "Deploy failed after 2 attempts"
          exit 1
