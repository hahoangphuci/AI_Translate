# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - aitranslate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aitranslate-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and Start virtual environment and Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_771C990487C54F5FA2FE527C91F30417 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B0113AD5896E4EF8B2B940E57D4F8B52 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_54E7EB8FDF8F4DDA935EAFF754E02423 }}

      - name: Create deployment zip
        run: >
          zip -r deploy.zip .
          -x "antenv/*"
          -x ".git/*"
          -x "app_web_view/*"
          -x "frontend/node_modules/*"
          -x "*__pycache__/*"
          -x "*/.venv/*"

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy1
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: aitranslate
          package: deploy.zip

      - name: Wait before deploy retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (attempt 2)
        id: deploy2
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        if: steps.deploy1.outcome == 'failure'
        with:
          app-name: aitranslate
          package: deploy.zip

      - name: Wait before final deploy retry
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 90

      - name: Deploy to Azure Web App (attempt 3)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: aitranslate
          package: deploy.zip
